<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Datanet | Temporarily unavailable</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --panel: #ffffff;
            --ink: #14213d;
            --muted: #5f6c7b;
            --brand: #0f766e;
            --line: #d9e4e1;
            --warn: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                linear-gradient(135deg, rgba(15, 118, 110, 0.08), transparent 38%),
                var(--bg);
            color: var(--ink);
            font-family: "Avenir Next", "Century Gothic", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        main {
            width: min(680px, 100%);
            padding: clamp(28px, 6vw, 52px);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 24px 60px rgba(20, 33, 61, 0.12);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            color: var(--brand);
            font-size: 0.84rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .status::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: var(--warn);
            box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.14);
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2rem, 7vw, 4.4rem);
            line-height: 0.98;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: clamp(1rem, 2vw, 1.15rem);
            line-height: 1.7;
        }

        .note {
            margin-top: 26px;
            padding-top: 22px;
            border-top: 1px solid var(--line);
            color: var(--ink);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <div class="status">Temporary service notice</div>
        <h1>Datanet is temporarily unavailable.</h1>
        <p>
            We are pausing new data bundle orders while we resolve an issue with our vendor.
            Existing orders are being reviewed, and service will resume as soon as the vendor connection is stable.
        </p>
        <p class="note">Thank you for your patience.</p>
    </main>
</body>
</html>

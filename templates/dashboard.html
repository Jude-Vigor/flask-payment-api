<!DOCTYPE html>
<html>
<head>
    <title>Payment Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        input, select {
            padding: 8px;
            margin-right: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .success { color: #22c55e; }
        .pending { color: #f59e0b; }
    </style>
</head>
<body>

<h1>💰 Payment Dashboard</h1>

<div class="card">
    <input type="text" id="email" placeholder="Filter by email">
    
    <select id="status">
        <option value="">All Status</option>
        <option value="PAID">Paid</option>
        <option value="PENDING">Pending</option>
        <option value="FAILED">Failed</option>
    </select>

    <input type="date" id="start">
    <input type="date" id="end">

    <button onclick="loadPayments()">Apply Filters</button>
</div>

<div class="card">
    <h3>Total Revenue: ₵ <span id="total">0</span></h3>
</div>

<div class="card">
    <canvas id="revenueChart"></canvas>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>Email</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Reference</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
let chart;

async function loadPayments() {
    const email = document.getElementById("email").value;
    const status = document.getElementById("status").value;
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    let url = `/api/payments?`;

    if (email) url += `email=${email}&`;
    if (status) url += `status=${status}&`;
    if (start && end) url += `start_date=${start}&end_date=${end}`;

    const res = await fetch(url);
    const data = await res.json();

    let total = 0;
    let daily = {};

    const tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    data.forEach(p => {
        if (p.status === "PAID") {
            total += p.amount;

            let date = p.created_at.split("T")[0];
            daily[date] = (daily[date] || 0) + p.amount;
        }

        tbody.innerHTML += `
            <tr>
                <td>${p.email}</td>
                <td>₵${p.amount}</td>
                <td class="${p.status === 'PAID' ? 'success' : 'pending'}">
                    ${p.status}
                </td>
                <td>${p.reference}</td>
            </tr>
        `;
    });

    document.getElementById("total").innerText = total;

    renderChart(daily);
}

function renderChart(data) {
    const labels = Object.keys(data);
    const values = Object.values(data);

    const ctx = document.getElementById("revenueChart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: "Revenue",
                data: values
            }]
        }
    });
}

loadPayments();
</script>

</body>
</html>

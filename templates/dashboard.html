<!DOCTYPE html>
<html>
<head>
    <title>Payment Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        input, select, button {
            padding: 8px;
            margin-right: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        .success { color: #22c55e; }
        .pending { color: #f59e0b; }
        .failed { color: #ef4444; }

        .action {
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        .deliver { background: #16a34a; }
        .fail { background: #dc2626; }
    </style>
</head>
<body>

<h1>Payment Dashboard</h1>

<div class="card">
    <input type="text" id="email" placeholder="Filter by email">

    <select id="status">
        <option value="">All Status</option>
        <option value="PAID">Paid</option>
        <option value="PENDING">Pending</option>
        <option value="FAILED">Failed</option>
    </select>

    <input type="date" id="start">
    <input type="date" id="end">

    <button onclick="loadPayments()">Apply Filters</button>
</div>

<div class="card">
    <h3>Total Revenue: GHS <span id="total">0</span></h3>
</div>

<div class="card">
    <canvas id="revenueChart"></canvas>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>Email</th>
                <th>Amount</th>
                <th>Payment</th>
                <th>Fulfillment</th>
                <th>Reference</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px;">
        <h3 style="margin: 0;">Fulfillment Jobs</h3>
        <div>
            <select id="job-status" onchange="loadFulfillmentJobs()">
                <option value="">All Jobs</option>
                <option value="PENDING">Pending</option>
                <option value="RETRYING">Retrying</option>
                <option value="COMPLETED">Completed</option>
                <option value="FAILED">Failed</option>
            </select>
            <button onclick="loadFulfillmentJobs()">Refresh Jobs</button>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>Order Ref</th>
                <th>Job Status</th>
                <th>Attempts</th>
                <th>Next Retry</th>
                <th>Last Error</th>
            </tr>
        </thead>
        <tbody id="jobs-body"></tbody>
    </table>
</div>

<script>
let chart;

function fulfillmentClass(status) {
    if (status === "COMPLETED") return "success";
    if (status === "DELIVERED") return "success";
    if (status === "FAILED") return "failed";
    return "pending";
}

function canResolveManually(order) {
    return order.status === "PAID" && ["QUEUED", "PROCESSING", "RETRYING"].includes(order.fulfillment_status);
}

async function updateOrderStatus(reference, action) {
    const res = await fetch(`/api/orders/${reference}/${action}`, {
        method: "POST"
    });

    if (!res.ok) {
        const error = await res.json().catch(() => ({ message: "Request failed" }));
        alert(error.message || "Request failed");
        return;
    }

    await loadPayments();
    await loadFulfillmentJobs();
}

async function loadPayments() {
    const email = document.getElementById("email").value;
    const status = document.getElementById("status").value;
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    let url = `/api/payments?`;

    if (email) url += `email=${encodeURIComponent(email)}&`;
    if (status) url += `status=${encodeURIComponent(status)}&`;
    if (start && end) url += `start_date=${start}&end_date=${end}`;

    const res = await fetch(url);
    const data = await res.json();

    let total = 0;
    let daily = {};

    const tbody = document.getElementById("table-body");
    tbody.innerHTML = "";

    data.forEach(order => {
        if (order.status === "PAID") {
            total += order.amount;

            const date = order.created_at.split("T")[0];
            daily[date] = (daily[date] || 0) + order.amount;
        }

        tbody.innerHTML += `
            <tr>
                <td>${order.email}</td>
                <td>GHS ${order.amount}</td>
                <td class="${order.status === 'PAID' ? 'success' : 'pending'}">${order.status}</td>
                <td class="${fulfillmentClass(order.fulfillment_status)}">${order.fulfillment_status}</td>
                <td>${order.reference}</td>
                <td>
                    ${canResolveManually(order) ? `
                        <button class="action deliver" onclick="updateOrderStatus('${order.reference}', 'mark-delivered')">Mark Delivered</button>
                        <button class="action fail" onclick="updateOrderStatus('${order.reference}', 'mark-failed')">Mark Failed</button>
                    ` : ''}
                </td>
            </tr>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
    renderChart(daily);
}

async function loadFulfillmentJobs() {
    const jobStatus = document.getElementById("job-status").value;
    const url = jobStatus
        ? `/api/fulfillment-jobs?status=${encodeURIComponent(jobStatus)}`
        : "/api/fulfillment-jobs";

    const res = await fetch(url);
    const jobs = await res.json();
    const tbody = document.getElementById("jobs-body");

    tbody.innerHTML = "";

    if (!jobs.length) {
        tbody.innerHTML = `
            <tr>
                <td colspan="5">No fulfillment jobs found.</td>
            </tr>
        `;
        return;
    }

    jobs.forEach(job => {
        tbody.innerHTML += `
            <tr>
                <td>${job.order.reference}</td>
                <td class="${fulfillmentClass(job.status)}">${job.status}</td>
                <td>${job.attempts}/${job.max_attempts}</td>
                <td>${job.next_retry_at || "-"}</td>
                <td>${job.last_error || "-"}</td>
            </tr>
        `;
    });
}

function renderChart(data) {
    const labels = Object.keys(data);
    const values = Object.values(data);
    const ctx = document.getElementById("revenueChart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Revenue",
                data: values
            }]
        }
    });
}

loadPayments();
loadFulfillmentJobs();
</script>

</body>
</html>
